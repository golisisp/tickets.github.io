<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Download Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
      background-color: #f2f2f2;
    }

    .download-btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }

    .download-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Download Your File</h1>
  <p>Click the button below to download:</p>

  <!-- Replace 'yourfile.pdf' with your actual file name -->
  <a href="yourfile.pdf" download class="download-btn">Download File</a>

</body>
</html>
